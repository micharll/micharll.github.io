    <style>
      header {
        text-align: center;
        padding: 5px 10px;
      }

        text-align: center;
      }
      .container {
        gap: 20px;
        justify-content: center;

            .container div {
        background-color: #f1f1f1;
        padding: 5px;
        font-size: 24px;
        aspect-ratio: 148/210;
        overflow: hidden;
}
      .container div img {
        height: 100%;
        width: 100%;
        object-fit: cover;
      }
      }
    </style>
  </head>
