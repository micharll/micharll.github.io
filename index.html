<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Micharll</title>
    <style>
      header {
        text-align: center;
        padding: 10px 20px;
      }
      h1 {
        font-size:48px; 
      }
      h2 {
        text-align: center;
      }
      .container {
        gap: 20px;
        justify-content: center;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        overflow: hidden;
      }
      @media (max-width: 600px) {
  .container {
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    overflow: hidden;
    gap: 20px;
    justify-content: center;
    display: grid;
  }
}
      .container div {
        background-color: #f1f1f1;
        padding: 5px;
        font-size: 24px;
        aspect-ratio: 148/210;
}
      .container div img {
        height: 100%;
        width: 100%;
        object-fit: cover;
      }
      
    </style>
  </head>
<body>
  <header> 
  <h1>Micharll</h1>
    <p>The Wonderful Works</p>
  </header>
  <div class="container">
    <div><img src="apple.jfif"></div>
    <div>...</div>
    <div>...</div>
    <div>...</div>
    <div>...</div>
    <div>...</div>
  </div>
</body>
  
</html>
