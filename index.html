<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Micharll</title>
    <style>
      header {
        border: 2px solid black;
        align-items: center;
        padding: 10px 20px;
      }
      h1 {
        font-size:48px; 
      }
      h2 {
        text-align: center;
      }
      .container {
        gap: 20px;
        justify-content: center;
        display: grid;
        grid-template-columns: repeat(3, 200px);
        overflow: hidden;
      }
      .container div {
        background-color: #f1f1f1;
        padding: 5px;
        font-size: 24px;
        aspect-ratio: 148 / 210;
}
      .container div img {
        height: 100%;
        width: 100%;
        object-fit: cover;
      }
      
    </style>
  </head>
<body>
  <header> 
  <h1>Micharll</h1>
    <p>Take a look around</p>
  </header>
  <h2>The Wonderful Works</h2>
  <div class="container">
    <div><img src="apple.jfif"></div>
    <div>Story 2</div>
    <div>Story 3</div>
    <div>Story 4</div>
    <div>Story 5</div>
    <div>Story 6</div>
  </div>
</body>
  
</html>
